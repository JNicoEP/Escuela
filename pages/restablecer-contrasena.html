<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Escuela Mariano Ariza</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reset-card {
            max-width: 450px;
            width: 100%;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            background-color: white;
        }
        .password-toggle-container {
            position: relative;
        }
        .password-toggle-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            color: #6c757d;
        }
    </style>
</head>
<body>

    <div class="reset-card">
        <div class="text-center mb-4">
            <i class="fas fa-school fa-3x text-primary mb-3"></i>
            <h4 class="fw-bold">Crear nueva contraseña</h4>
            <p class="text-muted small">Ingresa tu nueva contraseña para acceder al Aula Virtual.</p>
        </div>

        <div id="messageContainer" class="alert d-none" role="alert"></div>

        <form id="updatePasswordForm">
            <div class="form-floating mb-3 password-toggle-container">
                <input type="password" class="form-control" id="newPassword" placeholder="Nueva Contraseña" required minlength="6">
                <label for="newPassword">Nueva Contraseña (mín. 6 caracteres)</label>
                <button class="btn btn-link password-toggle-btn" type="button" id="toggleNewPassword">
                    <i class="fas fa-eye"></i>
                </button>
            </div>

            <div class="form-floating mb-4 password-toggle-container">
                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirmar Contraseña" required minlength="6">
                <label for="confirmPassword">Confirmar Contraseña</label>
                <button class="btn btn-link password-toggle-btn" type="button" id="toggleConfirmPassword">
                    <i class="fas fa-eye"></i>
                </button>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">Guardar contraseña</button>
                <a href="../index.html" class="btn btn-outline-secondary">Volver al inicio</a>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module" src="../src/js/pages/reset-password.js"></script>

</body>
</html>
